server:
  port: 8080
spring:
  application:
    name: DigitPermit
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/digit_permit_db
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    enabled: true
    schemas: public
    default-schema: public
    baseline-on-migrate: true
    locations: classpath:db/migration/public

resilience4j:
  circuitbreaker:
    instances:
      permit-service:
        registerHealthIndicator: true
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        permittedNumberOfCallsInHalfOpenState: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  timelimiter:
    instances:
      permit-service:
        timeoutDuration: 5s
  retry:
    instances:
      permit-service:
        maxAttempts: 3
        waitDuration: 1000ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2


digitpermit:
  exchange_key: ${EXCHANGE_KEY:digit_permit_exchange}
  routing_key: ${ROUTING_KEY:digit_permit_routing_key}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

payment:
  gateway:
    url: http://localhost:8081/api
